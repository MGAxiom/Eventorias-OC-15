name: CI - Tests & SonarCloud Analysis & Delivery

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/'

  instrumented-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b  # v2.35.0
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [ unit-tests, instrumented-tests ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Run tests and generate coverage report
        run: ./gradlew testDebugUnitTest jacocoTestReportAll

      - name: Debug coverage files       # <-- ADD THIS STEP HERE
        run: |
          echo "=== Jacoco exec files ==="
          find . -name "*.exec" -o -name "*.ec" | head -20
          echo "=== Jacoco XML reports ==="
          find . -name "jacocoTestReport*.xml" | head -20
          echo "=== Kotlin class files ==="
          find . -path "*/tmp/kotlin-classes/debug*" -name "*.class" | head -20
          echo "=== Build outputs ==="
          find . -path "*/build/outputs/unit_test_code_coverage*" | head -20

      - name: Analyze with SonarCloud
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.projectKey=MGAxiom_Eventorias-OC-15
            -Dsonar.organization=mgaxiom
            -Dsonar.qualitygate.wait=true
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/jacocoTestReportAll/jacocoTestReportAll.xml

      - name: Check Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496  # v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  deploy:
    runs-on: ubuntu-latest
    needs: [ unit-tests, instrumented-tests, sonarcloud ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6  # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk