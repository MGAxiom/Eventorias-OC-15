name: CI - Tests & SonarCloud Analysis & Delivery

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/'

      - name: Upload unit test exec files
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-exec
          path: '**/build/outputs/unit_test_code_coverage/**/*.exec'
          if-no-files-found: error

  instrumented-tests:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b  # v2.35.0
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/'

      - name: Upload instrumented test exec files
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-exec
          path: '**/build/outputs/code_coverage/**/*.ec'
          if-no-files-found: warn

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [ unit-tests, instrumented-tests ]
    permissions:
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            21
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Download unit test exec files
        uses: actions/download-artifact@v4
        with:
          name: unit-test-exec
          path: .

      - name: Download instrumented test exec files
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: instrumented-test-exec
          path: .

      - name: Generate merged coverage report
        run: ./gradlew jacocoTestReportAll

      - name: Debug coverage files
        run: |
          echo "=== All exec/ec files after download ==="
          find . -name "*.exec" -o -name "*.ec" | grep -v build/tmp
          echo "=== Coverage report location ==="
          find . -name "jacocoTestReportAll.xml"

      - name: Check overall coverage threshold
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('build/reports/jacoco/jacocoTestReportAll/jacocoTestReportAll.xml')
          root = tree.getroot()
          counters = {c.attrib['type']: c.attrib for c in root.findall('counter')}
          missed = int(counters['LINE']['missed'])
          covered = int(counters['LINE']['covered'])
          pct = (covered / (missed + covered)) * 100
          print(f'{pct:.1f}')
          ")
          echo "Overall line coverage: $COVERAGE%"
          python3 -c "
          cov = float('$COVERAGE')
          if cov < 70.0:
              raise SystemExit(f'Coverage {cov:.1f}% is below threshold of 70.0%')
          print(f'Coverage check passed: {cov:.1f}%')
          "

      - name: Set Sonar branch name
        id: branch
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=main" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          fi

      - name: Analyze with SonarCloud
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          args: >
            -Dsonar.projectKey=MGAxiom_Eventorias-OC-15
            -Dsonar.organization=mgaxiom
            -Dsonar.qualitygate.wait=true
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/jacocoTestReportAll/jacocoTestReportAll.xml
            -Dsonar.coverage.exclusions=**/EventFilterProcessor.kt
            -Dsonar.branch.name=${{ steps.branch.outputs.name }}

      - name: Check Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496  # v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  deploy:
    runs-on: ubuntu-latest
    needs: [ unit-tests, instrumented-tests, sonarcloud ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json

      - name: Create apikey.properties
        env:
          APIKEY_PROPERTIES_CONTENT: ${{ secrets.APIKEY_PROPERTIES }}
        run: echo "$APIKEY_PROPERTIES_CONTENT" > apikey.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6  # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk